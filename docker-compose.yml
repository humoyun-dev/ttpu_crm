services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crm_server}
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_local_pass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm_user} -d ${POSTGRES_DB:-crm_server}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    command: /app/entrypoint.sh
    restart: unless-stopped
    env_file:
      - ./server/.env
    volumes:
      - ./server:/app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9006:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\" 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  bot2:
    build:
      context: ./bot2_service
    command: python -m bot2_service.main
    restart: unless-stopped
    env_file:
      - ./bot2_service/.env
    volumes:
      - ./bot2_service/src:/app/src
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  dashboard:
    build:
      context: ./dashboard
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:9006}
    command: npm run start
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - server
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Runs CRM followup messages on a schedule (every 15 min).
  # Reuses the server image — no extra build needed.
  followup_cron:
    image: ttpu_crm-server:latest
    command: >
      sh -c "while true; do
        python manage.py process_followups;
        sleep 900;
      done"
    restart: unless-stopped
    env_file:
      - ./server/.env
    depends_on:
      server:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  postgres_data:
