services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crm_server}
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_local_pass}
    ports:
      # Bind to localhost only — don't expose Postgres on all host interfaces.
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm_user} -d ${POSTGRES_DB:-crm_server}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  server:
    build:
      context: ./server
    image: ttpu_crm-server:latest
    command: /app/entrypoint.sh
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ./server:/app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9006:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\" 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 768M

  bot2:
    build:
      context: ./bot2_service
    image: ttpu_crm-bot2:latest
    command: python -m bot2_service.main
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ./bot2_service/src:/app/src
    depends_on:
      server:
        condition: service_healthy
    # Checks that PID 1 (the bot process) is still alive.
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  dashboard:
    build:
      context: ./dashboard
      args:
        # Brauzerga ko'rinadigan API URL — markazlashgan ./.env dan olinadi.
        # Prod uchun root .env da NEXT_PUBLIC_API_URL ni o'zgartiring.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:9006}
    image: ttpu_crm-dashboard:latest
    command: node server.js
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - server
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000').then(()=>process.exit(0)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

  # Scheduled jobs: followup messages + pending Telegram posts (every 60s).
  # Reuses the server image — no extra build or Django app reload.
  followup_cron:
    image: ttpu_crm-server:latest
    command: python manage.py run_scheduler
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ./server:/app
    depends_on:
      db:
        condition: service_healthy
      server:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:
