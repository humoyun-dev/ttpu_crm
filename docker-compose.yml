services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crm_server}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-crm_server}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    command: /app/entrypoint.sh
    restart: unless-stopped
    env_file:
      - ./server/.env
    volumes:
      - ./server:/app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9006:8000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  bot2:
    build:
      context: ./bot2_service
    command: python -m bot2_service.main
    restart: unless-stopped
    env_file:
      - ./bot2_service/.env
    volumes:
      - ./bot2_service/src:/app/src
    depends_on:
      server:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  dashboard:
    build:
      context: ./dashboard
      args:
        # Baked into the client bundle at build time; set to the public API URL the
        # browser can reach (NOT the internal docker hostname).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    command: npm run start
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - server
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
