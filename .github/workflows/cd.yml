name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            DEPLOY=${{ secrets.DEPLOY_PATH }}
            cd $DEPLOY

            echo "==> git pull"
            git pull origin main

            echo "==> pip install (server)"
            $DEPLOY/server/venv/bin/pip install -r $DEPLOY/server/requirements.txt -q

            echo "==> django migrate + collectstatic"
            cd $DEPLOY/server
            $DEPLOY/server/venv/bin/python manage.py migrate --noinput
            $DEPLOY/server/venv/bin/python manage.py collectstatic --noinput

            echo "==> restart gunicorn (supervisord)"
            sudo supervisorctl restart ttpu_crm

            echo "==> pip install (bot2)"
            $DEPLOY/bot2_service/.venv/bin/pip install -e $DEPLOY/bot2_service -q

            echo "==> restart bot2 (supervisord)"
            sudo supervisorctl restart ttpu-bot2

            echo "==> build dashboard"
            cd $DEPLOY/dashboard
            /home/giga/.nvm/versions/node/v22.22.0/bin/npm ci --prefer-offline --silent
            /home/giga/.nvm/versions/node/v22.22.0/bin/npm run build

            echo "==> restart dashboard (supervisord)"
            sudo supervisorctl restart ttpu-dashboard

            echo "==> health check"
            sleep 3
            curl -sf http://localhost:9006/healthz || (echo "Health check failed!" && exit 1)

            echo "==> Deploy complete"
