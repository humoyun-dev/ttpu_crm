name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "==> git pull"
            git pull origin main

            echo "==> docker compose build (only changed services)"
            docker compose build server bot2 dashboard

            echo "==> docker compose up"
            docker compose up -d --remove-orphans

            echo "==> django migrations"
            docker compose exec -T server python manage.py migrate --noinput

            echo "==> collect static"
            docker compose exec -T server python manage.py collectstatic --noinput

            echo "==> health check"
            sleep 5
            curl -sf http://localhost:9006/healthz || (echo "Health check failed!" && exit 1)

            echo "==> Deploy complete"
