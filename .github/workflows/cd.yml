name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to server
    runs-on: self-hosted

    steps:
      - name: git pull
        run: |
          cd /home/giga/ttpu_crm
          git pull origin main

      - name: pip install (server)
        run: |
          /home/giga/ttpu_crm/server/venv/bin/pip install \
            -r /home/giga/ttpu_crm/server/requirements.txt -q

      - name: django migrate + collectstatic
        run: |
          cd /home/giga/ttpu_crm/server
          /home/giga/ttpu_crm/server/venv/bin/python manage.py migrate --noinput
          /home/giga/ttpu_crm/server/venv/bin/python manage.py collectstatic --noinput

      - name: restart gunicorn
        run: sudo supervisorctl restart ttpu_crm

      - name: pip install (bot2)
        run: |
          /home/giga/ttpu_crm/bot2_service/.venv/bin/pip install \
            -e /home/giga/ttpu_crm/bot2_service -q

      - name: restart bot2
        run: sudo supervisorctl restart ttpu-bot2

      - name: build dashboard
        run: |
          export PATH="/home/giga/.nvm/versions/node/v22.22.0/bin:$PATH"
          cd /home/giga/ttpu_crm/dashboard
          npm ci --prefer-offline --silent
          npm run build

      - name: restart dashboard
        run: sudo supervisorctl restart ttpu-dashboard

      - name: health check
        run: |
          sleep 3
          curl -sf http://localhost:9006/healthz || (echo "Health check failed!" && exit 1)
          echo "Deploy complete"
