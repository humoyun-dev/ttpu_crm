name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Django tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-django pytest-cov model-bakery

      - name: Run tests
        env:
          USE_SQLITE: "1"
          DJANGO_SECRET_KEY: "ci-test-secret-key"
          DJANGO_DEBUG: "false"
          SECURE_SSL_REDIRECT: "false"
          JWT_COOKIE_SECURE: "false"
          SESSION_COOKIE_SECURE: "false"
          CSRF_COOKIE_SECURE: "false"
        run: pytest tests/ -q --tb=short

  lint:
    name: Bot syntax check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: bot2_service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: bot2_service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile src/bot2_service/handlers.py src/bot2_service/api.py src/bot2_service/catalog_cache.py
