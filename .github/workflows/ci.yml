name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Django tests
    runs-on: ubuntu-latest

    # Run against PostgreSQL (matches prod) instead of SQLite, so DB-specific
    # behaviour (constraints, JSON queries, cascades) is exercised in CI.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: crm_test
          POSTGRES_USER: crm_user
          POSTGRES_PASSWORD: crm_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-django pytest-cov model-bakery

      - name: Run tests
        env:
          USE_SQLITE: "0"
          POSTGRES_HOST: "localhost"
          POSTGRES_PORT: "5432"
          POSTGRES_DB: "crm_test"
          POSTGRES_USER: "crm_user"
          POSTGRES_PASSWORD: "crm_pass"
          DJANGO_SECRET_KEY: "ci-test-secret-key-that-is-long-enough-for-hmac-sha256"
          DJANGO_DEBUG: "false"
          SECURE_SSL_REDIRECT: "false"
          JWT_COOKIE_SECURE: "false"
          SESSION_COOKIE_SECURE: "false"
          CSRF_COOKIE_SECURE: "false"
          SERVICE_TOKEN_BOT2_HASH: "b6c7927026637fe7a3b9986de3c8e8e93362253632915189cf59287cc0104f36"
        run: pytest tests/ -q --tb=short

  lint:
    name: Bot syntax check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: bot2_service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: bot2_service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile src/bot2_service/handlers.py src/bot2_service/api.py src/bot2_service/catalog_cache.py
