server {
    listen 80;
    server_name marketing.polito.uz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name marketing.polito.uz;

    # ⚠ SSL sertifikat yo'llari (certbot yoki mavjud sertifikat)
    ssl_certificate     /etc/letsencrypt/live/marketing.polito.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/marketing.polito.uz/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Health check (auth yo'q)
    location = /healthz {
        proxy_pass         http://127.0.0.1:9006;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Public employer access links
    location /l/ {
        proxy_pass         http://127.0.0.1:9006;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Django API — /api/, /superadmin/, /static/, /media/
    location ~ ^/(api|superadmin|static|media)/ {
        proxy_pass         http://127.0.0.1:9006;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Dashboard (Next.js PM2 — port 3000)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
